<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Scrapbook</title>
</head>
<body>

    <h1>My Digital Scrapbook</h1>

    <!-- Page 1 -->
    <div>
        <h2>Vacation Memories</h2>
        <p>Here we were at the beach, soaking up the sun. One of my favorite trips!</p>
        <img src="vacation-photo.jpg" alt="Vacation Photo" width="300">
        <p>Watch the video from the trip below:</p>
        <video controls width="300">
            <source src="vacation-video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <hr>

    <!-- Page 2 -->
    <div>
        <h2>Concert Night</h2>
        <p>The concert was insane! Can't believe we were so close to the stage!</p>
        <img src="concert-photo.jpg" alt="Concert Photo" width="300">
        <p>Listen to the song they played live:</p>
        <audio controls>
            <source src="concert-song.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <hr>

</body>
</html>
